[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
  "A",
  "ASYNC",
  "B",
  "C4",
  "D",
  "E",
  "F",
  "I",
  "N",
  "PERF",
  "PIE",
  "PL",
  "PT",
  "RET",
  "RUF",
  "SIM",
  "T20",
  "UP",
  "W"
]
ignore = [
  "D203",
  "D213"
]

[tool.ruff.lint.isort]
known-first-party = ["custom_components.shoppingtajm"]

[tool.mypy]
python_version = "3.12"
plugins = []
show_error_codes = true
strict = true
warn_unreachable = true
ignore_missing_imports = true
disable_error_code = [
  "misc"
]

[[tool.mypy.overrides]]
module = "custom_components.shoppingtajm.*"
disallow_subclassing_any = false
